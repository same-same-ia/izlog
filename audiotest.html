    var d=dec.getChannelData(0), pk=0; for(var i=0;i<d.length;i+=200){var a=Math.abs(d[i]); if(a>pk)pk=a;}
    log('decoded len='+dec.length+' sr='+dec.sampleRate+' ch='+dec.numberOfChannels+' peak='+pk.toFixed(4));
    var src=actx.createBufferSource(); src.buffer=dec; src.connect(actx.destination);
    src.onended=function(){ log('WA ended'); };
    src.start(0);
    log('WA started, state='+actx.state+' t='+actx.currentTime.toFixed(3));
    setTimeout(function(){ log('WA +500ms t='+actx.currentTime.toFixed(3)+' state='+actx.state); }, 500);
  }
});
